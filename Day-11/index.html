<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Modern Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1 class="title">⏱ Stopwatch</h1>

        <div id="display">00:00:00:000</div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
